<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR1'26 · Activity Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=SF+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Copy all your existing CSS here -->
<style>
  /* Include all the existing CSS from your current dashboard */
  :root {
    --bg:        #000000;
    --surface:   #0c0c0e;
    --surface-2: #161618;
    --surface-3: #1f1f22;
    --line:      #2a2a2e;
    --text:      #ffffff;
    --text-dim:  #98989d;
    --text-faint:#636366;
    --not-started: #2c2c2e;
    --in-progress: #00aeff;
    --in-progress-glow: rgba(0, 174, 255, 0.5);
    --completed:   #b6ff3c;
    --completed-glow: rgba(182, 255, 60, 0.4);
    --issue:       #ff375f;
    --issue-glow:  rgba(255, 55, 95, 0.55);
    --c1: #ff2d92; --c2: #bf5af2; --fn: #0a84ff; --up: #30d158; --ns: #ff9f0a;
  }
  
  /* Include all your existing CSS... */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    letter-spacing: -0.01em;
  }
  
  /* Real-time status indicator */
  .sync-status {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(12, 12, 14, 0.9);
    backdrop-filter: blur(20px);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-family: 'SF Mono', monospace;
    border: 1px solid var(--line);
    z-index: 200;
  }
  .sync-status.syncing { color: var(--in-progress); }
  .sync-status.synced { color: var(--completed); }
  .sync-status.error { color: var(--issue); }
  
  /* Simple access control notice */
  .access-notice {
    background: linear-gradient(90deg, rgba(255,45,146,0.1), rgba(191,90,242,0.1));
    border: 1px solid rgba(255,45,146,0.3);
    color: var(--text);
    padding: 12px 24px;
    margin: 16px 32px;
    border-radius: 12px;
    font-size: 13px;
    text-align: center;
    font-weight: 500;
  }
  .access-notice.read-only {
    background: linear-gradient(90deg, rgba(182,255,60,0.1), rgba(48,209,88,0.1));
    border-color: rgba(182,255,60,0.3);
  }
</style>
</head>
<body>

<!-- Sync Status Indicator -->
<div class="sync-status synced" id="sync-status">
  ● Live
</div>

<!-- Access Control Notice -->
<div class="access-notice" id="access-notice" style="display: none;">
  ⚡ War Room Control Mode - Task updates enabled
</div>

<!-- Copy all your existing dashboard HTML here -->
<!-- This should include topbar, hero, squads, drill-down, etc. -->
<div class="topbar">
  <div class="brand">
    <span class="live-pill">LIVE</span>
    <div class="titles">
      <div class="label">Activity Console</div>
      <div class="quarter mono">QR1'26 · 14–15 Feb 2026 · Hariharan, P.</div>
    </div>
  </div>
  <div></div>
  <div class="clocks">
    <div class="item">
      <div class="lbl">Live IST</div>
      <div class="val mono" id="clock-now">--:--:--</div>
    </div>
    <div class="item">
      <div class="lbl">Live GMT</div>
      <div class="val mono" id="clock-gmt">--:--:--</div>
    </div>
  </div>
</div>

<!-- Include rest of your dashboard HTML structure -->
<div id="dashboard-content">
  <!-- Your existing hero, squads, drill-down sections go here -->
  <p style="color: var(--text-dim); text-align: center; padding: 40px;">
    Dashboard structure loading... (Copy your existing HTML here)
  </p>
</div>

<script>
// =====================================================
// SIMPLE REAL-TIME WITH JSON POLLING
// =====================================================

// Configuration
const SYNC_INTERVAL = 10000; // 10 seconds
const DATA_URL = 'https://raw.githubusercontent.com/pxhariharan-cpu/qr1-26-dashboard/main/data.json';
const ACCESS_KEY = 'qr1-war-room-2026'; // Simple access control

// Check URL parameters for access level
const urlParams = new URLSearchParams(window.location.search);
const accessLevel = urlParams.get('access') || 'view';
const providedKey = urlParams.get('key') || '';

let isOperator = false;
let taskState = {};
let lastSyncTime = 0;

// Simple access control
function initializeAccess() {
  if (accessLevel === 'operator' && providedKey === ACCESS_KEY) {
    isOperator = true;
    document.getElementById('access-notice').style.display = 'block';
    document.getElementById('access-notice').textContent = '⚡ War Room Control Mode - Task updates enabled';
  } else if (accessLevel === 'operator') {
    // Wrong key
    document.getElementById('access-notice').style.display = 'block';
    document.getElementById('access-notice').className = 'access-notice read-only';
    document.getElementById('access-notice').textContent = '🔒 Invalid access key - Read-only mode active';
  } else {
    // Leadership/view mode
    document.getElementById('access-notice').style.display = 'block';
    document.getElementById('access-notice').className = 'access-notice read-only';
    document.getElementById('access-notice').textContent = '👁️ Leadership View - Real-time monitoring (updates every 10 seconds)';
  }
}

// Real-time data sync
async function syncData() {
  const syncStatus = document.getElementById('sync-status');
  
  try {
    syncStatus.textContent = '⟳ Syncing...';
    syncStatus.className = 'sync-status syncing';
    
    // Add cache-busting timestamp
    const response = await fetch(`${DATA_URL}?t=${Date.now()}`);
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }
    
    const data = await response.json();
    
    if (data.lastUpdated > lastSyncTime) {
      // New data available
      Object.assign(taskState, data.tasks);
      lastSyncTime = data.lastUpdated;
      renderDashboard();
      
      syncStatus.textContent = `● Live (${new Date().toLocaleTimeString()})`;
      syncStatus.className = 'sync-status synced';
    } else {
      syncStatus.textContent = '● Live';
      syncStatus.className = 'sync-status synced';
    }
    
  } catch (error) {
    console.error('Sync error:', error);
    syncStatus.textContent = '⚠ Offline';
    syncStatus.className = 'sync-status error';
  }
}

// Update task status (for operators only)
function updateTaskStatus(uid, newStatus, errorMessage = '') {
  if (!isOperator) {
    alert('🔒 Read-only access. Only war room operators can update tasks.\n\nTo get operator access:\n1. Add ?access=operator&key=qr1-war-room-2026 to the URL\n2. Or contact the war room team');
    return;
  }
  
  // Update local state
  if (!taskState[uid]) taskState[uid] = {};
  taskState[uid].status = newStatus;
  taskState[uid].changedAt = new Date().toISOString();
  taskState[uid].errorMessage = newStatus === 'issue' ? errorMessage : '';
  
  // Save to localStorage as backup
  localStorage.setItem('qr1-task-updates', JSON.stringify({
    tasks: taskState,
    lastUpdated: Date.now(),
    updatedBy: 'war-room-operator'
  }));
  
  // Re-render immediately
  renderDashboard();
  
  // TODO: Push to GitHub data.json (requires GitHub API or manual update)
  console.log('Task updated:', uid, newStatus, errorMessage);
}

// Initialize dashboard
function renderDashboard() {
  // Your existing render functions go here
  console.log('Dashboard rendered with', Object.keys(taskState).length, 'tasks');
  
  // Disable controls for read-only users
  if (!isOperator) {
    document.querySelectorAll('.check, .ctx-menu').forEach(el => {
      if (el.style) {
        el.style.pointerEvents = 'none';
        el.style.opacity = '0.7';
      }
    });
  }
}

// Clock functions
function pad(n) { return String(n).padStart(2, '0'); }
function tickClock() {
  const now = new Date();
  // IST
  const ist = new Date(now.getTime() + (5.5 * 3600 * 1000) + (now.getTimezoneOffset() * 60 * 1000));
  if (document.getElementById('clock-now')) {
    document.getElementById('clock-now').textContent = pad(ist.getHours()) + ':' + pad(ist.getMinutes()) + ':' + pad(ist.getSeconds());
  }
  
  // GMT
  const gmt = new Date(now.getTime() + (now.getTimezoneOffset() * 60 * 1000));
  if (document.getElementById('clock-gmt')) {
    document.getElementById('clock-gmt').textContent = pad(gmt.getHours()) + ':' + pad(gmt.getMinutes()) + ':' + pad(gmt.getSeconds());
  }
}

// Initialize everything
document.addEventListener('DOMContentLoaded', () => {
  initializeAccess();
  
  // Start clocks
  tickClock();
  setInterval(tickClock, 1000);
  
  // Initial sync
  syncData();
  
  // Regular sync
  setInterval(syncData, SYNC_INTERVAL);
  
  // Load from localStorage as fallback
  const stored = localStorage.getItem('qr1-task-updates');
  if (stored) {
    try {
      const data = JSON.parse(stored);
      Object.assign(taskState, data.tasks || {});
      renderDashboard();
    } catch (e) {}
  }
});

console.log('Simple Real-Time QR1\'26 Dashboard initialized');
console.log('Access level:', accessLevel, isOperator ? '(Operator)' : '(Read-only)');
</script>
</body>
</html>
